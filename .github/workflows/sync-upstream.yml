name: Sync upstream main

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/crshdn/mission-control.git || true
          git remote set-url upstream https://github.com/crshdn/mission-control.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Fast-forward main from upstream
        run: |
          git checkout main
          git merge --ff-only upstream/main

      - name: Push to origin
        run: git push origin main
